name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Iron Proxy (egress control)
        uses: ironsh/iron-proxy-action@v1
        with:
          egress-rules: egress-rules.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-minify-plugin

      - name: Build and deploy docs
        run: mkdocs gh-deploy --force --clean

      - name: Iron Proxy summary
        if: always()
        uses: ironsh/iron-proxy-action@v1
        with:
          show-summary: true
