site_name: Hermes Agent
site_description: Self-improving AI employee that connects to your messaging platforms
site_author: Hermes Team
repo_url: https://github.com/hermesai/hermes-agent
repo_name: hermesai/hermes-agent
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration Reference: configuration.md
  - Tools:
      - Overview: tools/index.md
      - CRM & Sales: tools/crm.md
      - Messaging: tools/messaging.md
      - Productivity: tools/productivity.md
      - Browser & Web: tools/browser.md
      - Media & Voice: tools/media.md
      - Integrations: tools/integrations.md
  - Platforms:
      - Overview: platforms/index.md
      - Telegram: platforms/telegram.md
      - Discord: platforms/discord.md
      - Slack: platforms/slack.md
      - WhatsApp: platforms/whatsapp.md
      - Signal: platforms/signal.md
      - Email (IMAP/SMTP): platforms/email.md
      - Matrix: platforms/matrix.md
      - SMS (Twilio): platforms/sms.md
      - DingTalk / Feishu / WeCom: platforms/enterprise-cn.md
      - Mattermost: platforms/mattermost.md
      - Home Assistant: platforms/homeassistant.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hermesai/hermes-agent
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback!
